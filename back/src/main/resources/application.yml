spring:
  application:
    name: tarasovna-crm
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
  datasource:
    url: jdbc:mysql://localhost:3306/tarasovna_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-secret-key-change-in-production-very-long-secret-key-at-least-256-bits
  expiration: 86400000 # 24 hours in milliseconds

logging:
  level:
    root: INFO
    by.tarasovna: DEBUG
    org.springframework.security: DEBUG
